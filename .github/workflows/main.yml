name: Generate Omni Daily Episode

on:
  schedule:
    - cron: '0 15 * * *'   # 7:00 AM PST (UTC-8) = 15:00 UTC
  workflow_dispatch:

jobs:
  generate-episode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install gTTS feedparser pydub

      - name: Generate episode
        run: python generate_episode.py

      - name: Commit and push
        run: |
          git config user.name "Omni Bot"
          git config user.email "omni-bot@users.noreply.github.com"
          git add episodes/ feed.xml seen_episodes.json
          git diff --staged --quiet || git commit -m "Episode $(date -u +%Y-%m-%d)"
          git push
